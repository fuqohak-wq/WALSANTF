<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Uang Walisantri - YAYASAN YAHYAWIYYAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-md border border-slate-700 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-blue-400 tracking-wide uppercase">YAYASAN YAHYAWIYYAH</h1>
            <p class="text-xs text-slate-400 mt-1">Sistem Validasi Struk Otomatis (OCR Gratis)</p>
        </div>

        <script>
            const API_URL = "https://script.google.com/macros/s/AKfycbz4WIiha9JSemWqoC4603207orwCm3eYd3XlMwXzNZBTLHvWsITLlyecHnjB4hvr-i03w/exec";
        </script>

        <div id="step-1" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Cari Nama Santri / Ustadz</label>
                <input type="text" id="search-input" oninput="cariData()" placeholder="Ketik Nama atau NIK..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div id="search-results" class="space-y-2 max-h-48 overflow-y-auto hidden"></div>
        </div>

        <div id="step-2" class="space-y-4 hidden mt-4 border-t border-slate-700/50 pt-4">
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                <span class="text-xs text-slate-400 block uppercase font-bold tracking-wider">Target Pengiriman:</span>
                <span id="target-nama" class="text-base font-bold text-emerald-400 block mt-1"></span>
                <span id="target-status" class="inline-block mt-1 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide bg-blue-500/20 text-blue-300 border border-blue-500/30"></span>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Nominal Pokok Kiriman (Rp)</label>
                <input type="number" id="nominal-pokok" oninput="hitungTotal()" placeholder="Contoh: 500000" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition text-emerald-400 font-bold text-lg">
            </div>

            <div id="box-instruksi" class="bg-slate-900/50 border border-dashed border-slate-700 p-4 rounded-xl space-y-3 hidden">
                <div class="text-center">
                    <span class="text-xs text-slate-400 block">TOTAL YANG HARUS DITRANSFER</span>
                    <span id="nominal-total-html" class="text-2xl font-black text-blue-400 tracking-tight block mt-1"></span>
                    <span class="text-[10px] text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20 inline-block mt-1">⚠️ Nilai transfer harus pas agar sistem OCR mengenali!</span>
                </div>
                
                <div class="text-xs border-t border-slate-800 pt-3 space-y-1 text-slate-300">
                    <p>🏦 <strong id="rek-bank">-</strong>: <span id="rek-nomor" class="font-mono text-blue-300 font-bold">-</span></p>
                    <p>👤 A.n: <strong id="rek-an">-</strong></p>
                </div>

                <div class="border-t border-slate-800 pt-3">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-amber-400 mb-1.5">Foto Bukti Transfer (Harus Jelas & Terang)</label>
                    <input type="file" id="file-struk" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                </div>
            </div>

            <button onclick="prosesValidasiOcr()" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition text-sm shadow-lg disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer" disabled>
                Kirim & Scan Struk Otomatis
            </button>
        </div>

        <div class="text-[10px] text-slate-500 text-center mt-6 border-t border-slate-800 pt-4">
            &copy; 2026 Fuqohak Executive Tech. OCR Automated System.
        </div>
    </div>

    <script>
        let dbSantri = [];
        let santriTerpilih = null;

        // Memuat database utama dari Google Sheet saat web pertama kali diakses
        window.onload = async function() {
            try {
                const res = await fetch(API_URL);
                const hasil = await res.json();
                if(hasil.status === "success") {
                    dbSantri = hasil.santri;
                    // Sinkronisasi data rekening
                    document.getElementById('rek-bank').innerText = hasil.rekening.bank;
                    document.getElementById('rek-nomor').innerText = hasil.rekening.nomor;
                    document.getElementById('rek-an').innerText = hasil.rekening.atas_nama;
                }
            } catch(e) {
                alert("Sistem gagal terhubung dengan server database Google Sheets.");
            }
        };

        // Fungsi Live Search Nama / NIK Santri
        function cariData() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = "";
            if(query.length < 2) { resDiv.classList.add('hidden'); return; }

            const filtered = dbSantri.filter(s => s.nama.toLowerCase().includes(query) || s.nik.includes(query));
            if(filtered.length > 0) {
                resDiv.classList.remove('hidden');
                filtered.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-slate-700/50 hover:bg-slate-700 p-3 rounded-xl text-xs flex justify-between items-center transition border border-slate-700 mt-1 cursor-pointer";
                    btn.innerHTML = `<div><strong class="text-slate-200 block">${s.nama}</strong><span class="text-[10px] text-slate-400">NIK: ${s.nik}</span></div> <span class="bg-slate-900 text-blue-400 font-mono px-2 py-1 rounded border border-slate-700 font-bold">${s.status}</span>`;
                    btn.onclick = () => pilihSantri(s);
                    resDiv.appendChild(btn);
                });
            } else {
                resDiv.classList.remove('hidden');
                resDiv.innerHTML = `<div class="text-xs text-slate-500 p-3 text-center bg-slate-900 rounded-xl">Nama atau NIK tidak ditemukan</div>`;
            }
        }

        // Aksi setelah profil target dipilih
        function pilihSantri(santri) {
            santriTerpilih = santri;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-input').value = santri.nama;
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('target-nama').innerText = santri.nama;
            document.getElementById('target-status').innerText = santri.status;
            document.getElementById('nominal-pokok').value = "";
            document.getElementById('box-instruksi').classList.add('hidden');
            document.getElementById('btn-submit').disabled = true;
        }

        // Menghitung nominal pokok + 3 digit kode unik anak
        function hitungTotal() {
            const nPokok = parseInt(document.getElementById('nominal-pokok').value) || 0;
            const boxInstruksi = document.getElementById('box-instruksi');
            const btnSubmit = document.getElementById('btn-submit');

            if(nPokok >= 10000 && santriTerpilih) {
                boxInstruksi.classList.remove('hidden');
                const kodeInt = parseInt(santriTerpilih.kode) || 0;
                const nTotal = nPokok + kodeInt; // Kalkulasi kode unik
                document.getElementById('nominal-total-html').innerText = "Rp " + nTotal.toLocaleString('id-ID');
                btnSubmit.disabled = false;
            } else {
                boxInstruksi.classList.add('hidden');
                btnSubmit.disabled = true;
            }
        }

        // Mengubah gambar struk fisik menjadi string Base64 agar bisa dikirim via JSON
        const fileToBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Proses pengiriman payload gambar ke engine OCR Google Drive
        async function prosesValidasiOcr() {
            const btn = document.getElementById('btn-submit');
            const fileInput = document.getElementById('file-struk');
            const nPokok = parseInt(document.getElementById('nominal-pokok').value) || 0;
            const kodeInt = parseInt(santriTerpilih.kode) || 0;
            const nTotal = nPokok + kodeInt;

            if (fileInput.files.length === 0) {
                alert("Silakan unggah atau foto struk bukti transfer Anda terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sistem Sedang Membaca Struk (OCR)...";

            try {
                const fileString = await fileToBase64(fileInput.files[0]);
                
                const payload = {
                    aksi: "uploadDanVerifyOCR",
                    nik: santriTerpilih.nik,
                    nama: santriTerpilih.nama,
                    nominal_pokok: nPokok,
                    nominal_total: nTotal,
                    image_base64: fileString,
                    device: navigator.userAgent
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const hasil = await response.json();

                if (hasil.status === "success") {
                    alert(hasil.message);
                    location.reload(); // Refresh halaman setelah sukses otomatis masuk sheet
                } else {
                    alert(hasil.message); // Memunculkan alasan penolakan jika nominal tidak cocok di struk
                    btn.disabled = false;
                    btn.innerText = "Kirim & Scan Struk Otomatis";
                }
            } catch (e) {
                alert("Koneksi bermasalah atau resolusi gambar struk terlalu besar.");
                btn.disabled = false;
                btn.innerText = "Kirim & Scan Struk Otomatis";
            }
        }
    </script>
</body>
</html>
