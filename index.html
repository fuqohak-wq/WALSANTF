<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Pembayaran Digital Otomatis PPMUY - YAYASAN YAHYAWIYYAH</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #064e3b !important;
            color: #f8fafc !important;
        }
        .tombol-utama {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            color: #020617;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-950 via-teal-950 to-slate-950 text-slate-100 min-h-screen flex flex-col justify-between p-4 antialiased mx-auto w-full max-w-md">

    <header class="w-full text-center py-2 flex justify-between items-center border-b border-white/10">
        <div class="text-left">
            <h1 class="text-[10px] font-black text-amber-400 tracking-widest uppercase">YAYASAN YAHYAWIYYAH</h1>
            <h2 class="text-base font-extrabold text-white tracking-tight leading-tight">SISTEM KONFIRMASI STRUK</h2>
        </div>
        <button onclick="bukaPanelAdmin()" id="btn-nav-admin" class="bg-white/10 hover:bg-white/20 text-xs font-black px-3 py-2 rounded-xl border border-white/10 transition flex items-center gap-1.5 relative">
            🔐 Admin 
            <span id="badge-antrean" class="hidden bg-rose-600 text-white font-black px-2 py-0.5 rounded-full text-[10px] shadow animate-bounce">0</span>
        </button>
    </header>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz4WIiha9JSemWqoC4603207orwCm3eYd3XlMwXzNZBTLHvWsITLlyecHnjB4hvr-i03w/exec";
        let intervalAdmin = null;
        let intervalBadgeLuar = null;
        let dbSantri = [];
        let santriTerpilih = null;
    </script>

    <main id="panel-walisantri" class="w-full flex-1 flex flex-col justify-center my-4 space-y-4">
        <div class="w-full bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-2">
            <label class="block text-xs font-black uppercase tracking-wider text-emerald-950">1. Cari Nama Santri / Ustadz :</label>
            <input type="text" id="search-input" oninput="cariData()" placeholder="Ketik nama anak di sini..." class="w-full bg-slate-100 border-2 border-emerald-200 focus:border-emerald-600 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 focus:outline-none transition">
            <div id="search-results" class="space-y-1.5 max-h-44 overflow-y-auto hidden pt-1"></div>
        </div>

        <div id="step-upload" class="w-full bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-3 hidden">
            <div class="bg-emerald-800 text-white p-3 rounded-xl shadow">
                <span class="text-[10px] uppercase font-bold text-emerald-300 block">Anak yang Dipilih:</span>
                <span id="target-nama" class="text-base font-black block leading-tight"></span>
            </div>

            <div class="space-y-1.5 pt-1">
                <span class="block text-xs font-black uppercase tracking-wider text-slate-700">2. Upload / Foto Struk Transfer :</span>
                <label for="file-struk" class="flex flex-col items-center justify-center border-2 border-dashed border-emerald-600 bg-emerald-50 hover:bg-emerald-100/50 rounded-2xl p-5 cursor-pointer transition text-center group">
                    <span id="icon-upload" class="text-3xl mb-1">📸</span>
                    <span id="text-upload-label" class="text-sm font-black text-emerald-950">Klik untuk Pilih Struk</span>
                    <span id="text-upload-sub" class="text-[10px] text-slate-500 font-medium mt-0.5">Sistem memproses semua jenis struk bank/ATM secara otomatis.</span>
                </label>
                <input type="file" id="file-struk" accept="image/*" onchange="fileKenaInput(this)" class="hidden">
            </div>
        </div>

        <div id="area-tombol-submit" class="hidden">
            <button onclick="prosesOtomatisasiOcrTotal()" id="btn-submit" class="w-full tombol-utama font-black py-4 rounded-2xl text-sm shadow-lg uppercase flex flex-col justify-center items-center border-b-4 border-amber-700 active:border-b-0 transition" disabled>
                <span id="btn-text" class="text-sm font-black tracking-wide">Kirim Bukti Transfer</span>
                <div id="progress-bar-container" class="w-2/3 bg-slate-950/20 h-1.5 rounded-full mt-1.5 hidden overflow-hidden">
                    <div id="progress-bar-fill" class="bg-slate-950 h-full w-0 transition-all duration-150"></div>
                </div>
            </button>
        </div>
    </main>

    <main id="panel-admin" class="w-full flex-1 flex flex-col my-4 space-y-4 hidden">
        <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-white/5">
            <div class="flex items-center gap-2">
                <span class="text-xs font-black uppercase text-amber-400">📋 ANTREAN MANUAL</span>
                <span id="indicator-refresh" class="text-[9px] text-slate-400 animate-pulse">🔄 Auto-sync</span>
            </div>
            <button onclick="keluarPanelAdmin()" class="text-xs text-rose-400 font-bold hover:underline">Keluar Admin</button>
        </div>
        <div id="list-validasi-admin" class="space-y-3 max-h-[70vh] overflow-y-auto">
            <div class="text-center text-xs text-slate-400 py-8">Memuat data verifikasi server...</div>
        </div>
    </main>

    <footer class="w-full text-[10px] text-emerald-400/60 text-center pt-2 border-t border-white/5 font-bold">
        &copy; 2026 PPMUY Anti-Fraud SmartRadar V10.4.
    </footer>

    <canvas id="canvas-kompresor" class="hidden"></canvas>

    <script>
        window.onload = async function() {
            try {
                const res = await fetch(API_URL);
                const hasil = await res.json();
                if(hasil.status === "success") { 
                    dbSantri = hasil.santri; 
                    
                    // --- FITUR AUTO-SELECT DARI PARAMETER URL ---
                    const urlParams = new URLSearchParams(window.location.search);
                    const namaParam = urlParams.get('nama');
                    if (namaParam && dbSantri.length > 0) {
                        const searchInput = document.getElementById('search-input');
                        if (searchInput) {
                            searchInput.value = namaParam;
                            cariData();
                            
                            // Auto select jika ada kecocokan unik
                            const queryLower = namaParam.toLowerCase().trim();
                            const matches = dbSantri.filter(s => s.nama.toLowerCase() === queryLower);
                            if (matches.length === 1) {
                                pilihSantri(matches[0]);
                            } else {
                                const partialMatches = dbSantri.filter(s => s.nama.toLowerCase().includes(queryLower));
                                if (partialMatches.length === 1) {
                                    pilihSantri(partialMatches[0]);
                                }
                            }
                        }
                    }
                }
                
                cekJumlahAntreanSaja();
                intervalBadgeLuar = setInterval(cekJumlahAntreanSaja, 20000);
            } catch(e) { console.log("Gagal memuat database."); }
        };

        async function cekJumlahAntreanSaja() {
            try {
                const res = await fetch(`${API_URL}?aksi=ambilAntreanAdmin`);
                const hasil = await res.json();
                const badge = document.getElementById('badge-antrean');
                if (hasil.status === "success" && hasil.data.length > 0) {
                    badge.innerText = hasil.data.length;
                    badge.classList.remove('hidden');
                } else { badge.classList.add('hidden'); }
            } catch(e) { console.log("Gagal cek badge luar."); }
        }

        function cariData() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = "";
            if(query.length < 2) { resDiv.classList.add('hidden'); return; }

            const filtered = dbSantri.filter(s => s.nama.toLowerCase().includes(query) || s.nik.includes(query));
            if(filtered.length > 0) {
                resDiv.classList.remove('hidden');
                filtered.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-slate-50 p-3 rounded-xl flex justify-between items-center mt-1 border border-slate-200 text-slate-900 shadow-sm";
                    btn.innerHTML = `<div><span class="block text-sm font-black">${s.nama}</span></div> <span class="bg-emerald-800 text-white font-black text-[10px] px-2 py-0.5 rounded">ID: +${s.kode}</span>`;
                    btn.onclick = () => pilihSantri(s);
                    resDiv.appendChild(btn);
                });
            }
        }

        function pilihSantri(santri) {
            santriTerpilih = santri;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-input').value = santri.nama;
            document.getElementById('step-upload').classList.remove('hidden');
            document.getElementById('area-tombol-submit').classList.remove('hidden');
            document.getElementById('target-nama').innerText = santri.nama;
            document.getElementById('btn-submit').disabled = true;
        }

        function fileKenaInput(input) {
            if(input.files.length > 0) {
                document.getElementById('icon-upload').innerText = "📄";
                document.getElementById('text-upload-label').innerText = "Struk Berhasil Dimasukkan!";
                document.getElementById('btn-submit').disabled = false;
            }
        }

        const optimasiGambarSisiKlien = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.getElementById('canvas-kompresor');
                    const ctx = canvas.getContext('2d');
                    const TARGET_WIDTH = 1200; 
                    let width = img.width; let height = img.height;
                    if (width > height) { let temp = width; width = height; height = temp; }
                    height *= TARGET_WIDTH / width; width = TARGET_WIDTH;
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const imgData = ctx.getImageData(0, 0, width, height);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        let grayscale = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        data[i] = data[i+1] = data[i+2] = grayscale;
                    }
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
        });

        async function prosesOtomatisasiOcrTotal() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const fileInput = document.getElementById('file-struk');
            const barContainer = document.getElementById('progress-bar-container');
            const barFill = document.getElementById('progress-bar-fill');

            btn.disabled = true; barContainer.classList.remove('hidden'); barFill.style.width = "10%";
            btnText.innerText = "MEMBACA DATA STRUK (10%)...";

            try {
                const fileGambarMentah = fileInput.files[0];
                const base64HasilFilter = await optimasiGambarSisiKlien(fileGambarMentah);

                const worker = await Tesseract.createWorker('ind', 1, {
                    logger: progress => {
                        if (progress.status === 'recognizing text') {
                            const persenAngka = Math.floor(progress.progress * 100);
                            barFill.style.width = `${persenAngka}%`;
                            btnText.innerText = `MEMINDAI... (${persenAngka}%)`;
                        }
                    }
                });

                await worker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-:/.,' });
                const ret = await worker.recognize(base64HasilFilter);
                
                const rawTextClean = ret.data.text.toUpperCase().replace(/[^A-Z0-9]/g, '');
                const textMurniTanpaSpasi = ret.data.text.replace(/\s+/g, '');
                const barisTeksAsli = ret.data.text.split('\n');
                await worker.terminate();

                const kataKunciValid = ["YAYASAN", "YAHYA", "WIYYAH", "PPMUY", "5309", "0038"];
                const apakahStrukYayasan = kataKunciValid.some(key => rawTextClean.includes(key));
                if (!apakahStrukYayasan) {
                    alert("❌ STRUK DITOLAK: Teks 'YAYASAN YAHYAWIYYAH' atau rekening '5309' tidak terdeteksi.");
                    btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
                    return;
                }

                let nominalTotalDitemukan = 0;

                for (let baris of barisTeksAsli) {
                    let barisClean = baris.toUpperCase().replace(/\s+/g, '');
                    if (barisClean.includes("NOMINAL") || barisClean.includes("TOTAL") || barisClean.includes("RP")) {
                        let kumpulanAngka = barisClean.match(/\d[\d\.,]*/g);
                        if (kumpulanAngka) {
                            for (let ang of kumpulanAngka) {
                                let nilaiLengkap = parseInt(ang.replace(/[^0-9]/g, ''));
                                if (nilaiLengkap >= 10000 && nilaiLengkap <= 2500000) {
                                    nominalTotalDitemukan = nilaiLengkap;
                                    break;
                                }
                            }
                        }
                    }
                    if (nominalTotalDitemukan > 0) break;
                }

                if (nominalTotalDitemukan === 0) {
                    const daftarAngkaStruk = textMurniTanpaSpasi.replace(/,00$/g, '').match(/\d[\d\.,]*/g) || [];
                    let kandidatLogis = [];
                    for (let hitung of daftarAngkaStruk) {
                        let angkaClean = hitung.replace(/[^0-9]/g, '');
                        let nominalKandidat = parseInt(angkaClean);
                        
                        if (angkaClean.includes("3305309") || angkaClean.includes("5309") || angkaClean.includes("0038")) {
                            continue; 
                        }

                        if (nominalKandidat >= 10000 && nominalKandidat <= 2500000) {
                            kandidatLogis.push(nominalKandidat);
                        }
                    }
                    if (kandidatLogis.length > 0) { nominalTotalDitemukan = Math.max(...kandidatLogis); }
                }

                if (nominalTotalDitemukan === 0) {
                    alert(`❌ STRUK TIDAK JELAS: Nominal transfer tidak terbaca detektor. Mohon gunakan screenshot gambar struk yang lebih tegak dan jelas.`);
                    btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
                    return;
                }

                let noRefFinal = "";
                const radarSeaBank = textMurniTanpaSpasi.match(/No\.Transaksi[:\s]*([A-Z0-9]{15,25})/i) || textMurniTanpaSpasi.match(/RefNo[:\s]*([A-Z0-9]{15,25})/i);
                const radarBCA = textMurniTanpaSpasi.match(/Ref(?:id)?[:\s\.]*([0-9A-Z]{12,30})/i) || textMurniTanpaSpasi.match(/950[0-9A-Z]{15,25}/i);
                const radarBRI = textMurniTanpaSpasi.match(/(?:BRIMORef|No\.Ref|Ref\.:)([0-9]{12,20})/i) || textMurniTanpaSpasi.match(/No\.Referensi[:\s]*([0-9]{12,20})/i);
                
                if (radarSeaBank) noRefFinal = "SEABANK-" + radarSeaBank[1].toUpperCase();
                else if (radarBCA) noRefFinal = "BCA-" + (radarBCA[1] || radarBCA[0]).toUpperCase();
                else if (radarBRI) noRefFinal = "BRI-" + (radarBRI[1] || radarBRI[0]).toUpperCase();
                else {
                    const radarAngkaPanjang = textMurniTanpaSpasi.match(/[0-9]{11,25}/g);
                    if (radarAngkaPanjang) {
                        let refDitemukan = radarAngkaPanjang.find(num => !num.includes("5309") && !num.includes("0038"));
                        if (refDitemukan) noRefFinal = "REF-" + refDitemukan;
                    }
                }

                if (!noRefFinal || noRefFinal.length < 8) {
                    noRefFinal = "TRX-" + nominalTotalDitemukan + "-" + Math.floor(Math.random() * 9000 + 1000);
                }

                btnText.innerText = "MENYIMPAN DATA AMAN...";

                const payload = {
                    aksi: "simpanTransaksiOtomatisPenuh",
                    nik: santriTerpilih.nik,
                    nama: santriTerpilih.nama,
                    nominal_total: nominalTotalDitemukan,
                    image_base64: base64HasilFilter, 
                    file_name: `STRUK_${santriTerpilih.nik}_${Date.now()}.jpg`,
                    device: navigator.userAgent,
                    no_ref: noRefFinal
                };

                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const hasil = await response.json();

                if (hasil.status === "success") {
                    alert(`Alhamdulillah Berhasil!\nSistem membaca nominal struk sebesar Rp ${nominalTotalDitemukan.toLocaleString('id-ID')}.\n${hasil.message}`);
                    
                    // --- KIRIM SINYAL MENUJU APLIKASI UTAMA (IFRAME LISTENER) ---
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({ type: 'TRANSFER_SUCCESS', data: hasil }, '*');
                    }
                    
                    location.reload();
                } else { alert(hasil.message); }

                btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
            } catch (e) {
                console.error(e);
                alert("Gagal memproses gambar bukti transfer.");
                btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
            }
        }

        function bukaPanelAdmin() {
            let pass = prompt("Masukkan Password Keamanan Admin:");
            if (pass === "adminppmuy2026") {
                if(intervalBadgeLuar) clearInterval(intervalBadgeLuar);
                document.getElementById('panel-walisantri').classList.add('hidden');
                document.getElementById('panel-admin').classList.remove('hidden');
                muatDataValidasiAdmin();
                intervalAdmin = setInterval(muatDataValidasiAdmin, 15000);
            } else if(pass !== null) { alert("Password salah!"); }
        }

        function keluarPanelAdmin() {
            document.getElementById('panel-admin').classList.add('hidden');
            document.getElementById('panel-walisantri').classList.remove('hidden');
            if (intervalAdmin) { clearInterval(intervalAdmin); intervalAdmin = null; }
            cekJumlahAntreanSaja();
            intervalBadgeLuar = setInterval(cekJumlahAntreanSaja, 20000);
        }

        async function muatDataValidasiAdmin() {
            const listDiv = document.getElementById('list-validasi-admin');
            const badge = document.getElementById('badge-antrean');
            const indikator = document.getElementById('indicator-refresh');
            if(indikator) indikator.innerText = "🔄 Menyinkronkan...";

            try {
                const res = await fetch(`${API_URL}?aksi=ambilAntreanAdmin`);
                const hasil = await res.json();
                if(indikator) indikator.innerText = "🔄 Auto-sync";
                
                if(hasil.status === "success" && hasil.data.length > 0) {
                    badge.innerText = hasil.data.length;
                    badge.classList.remove('hidden');
                    listDiv.innerHTML = "";
                    hasil.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "bg-white text-slate-900 p-4 rounded-xl border-l-4 border-amber-500 shadow space-y-3 text-xs mt-3";
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-center font-black text-slate-700 gap-2">
                                <span class="text-emerald-950 font-extrabold text-sm truncate max-w-[180px]">${item.nama}</span>
                                <div class="flex items-center bg-slate-100 px-2 py-1 rounded-lg border border-slate-300">
                                    <span class="text-slate-500 font-bold mr-1">Rp</span>
                                    <input type="number" id="input-nom-${item.id_trx}" value="${item.nominal_total}" class="w-24 text-right bg-transparent text-rose-600 font-mono font-black text-sm focus:outline-none focus:bg-amber-100 rounded px-1">
                                </div>
                            </div>
                            <div class="text-[11px] text-slate-500 space-y-0.5 bg-slate-50 p-2 rounded border border-slate-100">
                                <div>📌 NO REF RADAR: <strong class="text-slate-800 font-mono">${item.no_ref}</strong></div>
                                <div>📅 Tanggal Kirim: ${item.timestamp}</div>
                            </div>
                            <div class="flex flex-col space-y-1.5 pt-1">
                                <a href="${item.link_struk}" target="_blank" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-center block shadow-sm">👁️ LIHAT STRUK ASLI</a>
                                <div class="flex space-x-2">
                                    <button onclick="tolakStrukAdmin('${item.id_trx}')" class="w-1/2 bg-rose-600 hover:bg-rose-700 text-white font-black py-2.5 rounded shadow-sm">❌ TOLAK</button>
                                    <button onclick="luluskanStrukAdmin('${item.id_trx}')" class="w-1/2 bg-emerald-600 hover:bg-emerald-700 text-white font-black py-2.5 rounded shadow-sm">✅ LULUSKAN</button>
                                </div>
                            </div>
                        `;
                        listDiv.appendChild(card);
                    });
                } else {
                    badge.classList.add('hidden');
                    listDiv.innerHTML = '<div class="text-center text-xs text-emerald-400 bg-emerald-950/40 py-8 border border-emerald-900/30 rounded-xl font-bold">🎉 Tidak ada antrean struk yang perlu divalidasi.</div>';
                }
            } catch (e) { 
                if(listDiv.innerHTML.includes("Memuat data")) {
                    listDiv.innerHTML = '<div class="text-center text-xs text-rose-400 py-8">Gagal memuat data antrean admin.</div>'; 
                }
            }
        }

        async function luluskanStrukAdmin(idTrx) {
            const inputElement = document.getElementById(`input-nom-${idTrx}`);
            const nominalTerbaru = inputElement ? parseInt(inputElement.value) : 0;

            if (!nominalTerbaru || nominalTerbaru < 10000) {
                alert("Nominal yang Anda input salah atau terlalu kecil!");
                return;
            }

            if (confirm(`Setujui transaksi ini dengan NOMINAL EDITAN: Rp ${nominalTerbaru.toLocaleString('id-ID')}?`)) {
                eksekusiKeputusanAdmin("luluskanTransaksiOlehAdmin", idTrx, nominalTerbaru);
            }
        }

        async function tolakStrukAdmin(idTrx) {
            if (confirm("Apakah Anda yakin ingin MENOLAK data struk bermasalah ini?")) {
                eksekusiKeputusanAdmin("tolakTransaksiOlehAdmin", idTrx, 0);
            }
        }

        async function eksekusiKeputusanAdmin(aksiKeputusan, idTrx, nominalKoreksi) {
            try {
                const payload = { 
                    aksi: aksiKeputusan, 
                    id_transaksi: idTrx,
                    nominal_koreksi: nominalKoreksi
                };
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const hasil = await res.json();
                if (hasil.status === "success") { alert("Keputusan berhasil disimpan."); muatDataValidasiAdmin(); } else { alert(hasil.message); }
            } catch(e) { alert("Gagal mengeksekusi perintah ke server."); }
        }
    </script>
</body>
</html>
