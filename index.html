<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Admin Dashboard - PPMUY 2026</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #0ea5e9;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
    h1 { font-size: 24px; color: var(--primary); }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { background: #334155; color: var(--text-muted); border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: all 0.3s; }
    .tab-btn.active { background: var(--primary); color: white; }
    .badge-count { background: var(--danger); color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; margin-left: 5px; }
    .grid-antrean { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; }
    .card h3 { font-size: 18px; margin-bottom: 5px; color: #fff; }
    .card .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
    .struk-container { width: 100%; height: 200px; background: #0f172a; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #475569; position: relative; }
    .struk-container img { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }
    .btn-link { display: inline-block; text-align: center; background: #475569; color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; margin-bottom: 15px; transition: 0.2s; }
    .btn-link:hover { background: #64748b; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
    .input-rupiah-clean { width: 100%; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; text-align: center; letter-spacing: 1px; }
    .input-rupiah-clean:focus { border-color: var(--primary); outline: none; }
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-acc { background: var(--success); }
    .btn-tolak { background: var(--danger); }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 5px; }
    .status-pending { background: rgba(245,158,11,0.2); color: var(--warning); }
    .status-lunas { background: rgba(16,185,129,0.2); color: var(--success); }
    .status-ditolak { background: rgba(239,68,68,0.2); color: var(--danger); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>Dashboard Validasi Pembayaran</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Pondok Pesantren Mutiara Ilmu (PPMUY)</p>
      </div>
      <div>
        <input type="password" id="pin-admin" value="adminppmuy2026" style="background: var(--card-bg); border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; color: white; text-align: center;" placeholder="Masukkan PIN Admin">
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" id="tab-pending" onclick="gantiTab('pending')">Antrean Pending <span id="count-pending" class="badge-count">0</span></button>
      <button class="tab-btn" id="tab-riwayat" onclick="gantiTab('riwayat')">Log Riwayat</button>
    </div>

    <!-- PANEL DAFTAR ANTREAN PENDING -->
    <div id="panel-pending" class="grid-antrean"></div>

    <!-- PANEL LOG RIWAYAT -->
    <div id="panel-riwayat" class="grid-antrean hidden"></div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text" style="font-weight: 500; letter-spacing: 0.5px;">Sedang Proses Mas Admin Ganteng, jangan sentuh aku, mohon tunggu...</p>
  </div>

  <script>
    // --- SILAKAN GANTI URL DI BAWAH INI DENGAN URL DEPLOYMENT APPS SCRIPT ANDA ---
    const API_URL = "https://script.google.com/macros/s/AKfycby_XXXXX_YOUR_WEB_APP_URL_HERE/exec"; 
    
    let dataAntreanGlobal = [];
    let currentTab = 'pending';

    // Inisialisasi awal saat web dibuka
    document.addEventListener("DOMContentLoaded", function() {
      muatDataLengkapSistem();
    });

    function muatDataLengkapSistem() {
      tampilkanLoading(true, "Mengunduh antrean data terbaru...");
      
      fetch(`${API_URL}?aksi=ambilDataAdminLengkap`)
        .then(res => res.json())
        .then(respon => {
          if (respon.status === "success") {
            document.getElementById("count-pending").innerText = respon.antrean.length;
            renderPanelPending(respon.antrean);
            renderPanelRiwayat(respon.riwayat);
          } else {
            alert("Gagal memuat data dari server: " + respon.message);
          }
        })
        .catch(err => alert("Koneksi gagal: " + err.toString()))
        .finally(() => tampilkanLoading(false));
    }

    // MEMBUAT COMPONENT CARD ANTREAN PENDING
    function renderPanelPending(listData) {
      let kontainer = document.getElementById("panel-pending");
      kontainer.innerHTML = "";

      if (listData.length === 0) {
        kontainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">🎉 Alhamdulillah, tidak ada antrean struk pending saat ini. Semua beres!</div>`;
        return;
      }

      listData.forEach(trx => {
        // PERBAIKAN: Direct link Google Drive bypass broken image logo retak
        let linkGambarMentah = trx.link_struk.replace("/file/d/", "/uc?export=view&id=").replace("/view?usp=drivesdk", "");
        
        // MASUKAN UTAMA: Hasil nominal OCR otomatis langsung diisi sebagai value input nominal
        let nominalDefaultOcr = (trx.nominal_total && parseInt(trx.nominal_total) > 0) ? trx.nominal_total : "";

        let htmlCard = `
          <div class="card" id="card-${trx.id_trx}">
            <div>
              <h3>${trx.nama}</h3>
              <div class="meta">
                <p>📅 ${trx.timestamp} | 🔑 ID: ${trx.id_trx}</p>
                <p style="margin-top: 4px;">📂 Ref: <b>${trx.no_ref}</b></p>
                <span class="status-badge status-pending">${trx.status}</span>
              </div>
              
              <div class="struk-container">
                <img src="${linkGambarMentah}" alt="Struk ${trx.nama}" onerror="this.onerror=null; this.src='https://placehold.co/400x300/1e293b/94a3b8?text=Klik+Tombol+Lihat+Struk';" onclick="window.open('${trx.link_struk}', '_blank')">
              </div>
              
              <a href="${trx.link_struk}" target="_blank" class="btn-link">👁️ BUKA DI TAB BARU</a>
              
              <div class="form-group">
                <label>Nominal Pembayaran Sah (Rp):</label>
                <!-- MASUKAN UTAMA: Input Masking dengan auto-titik ribuan -->
                <input type="text" 
                       id="input-mask-${trx.id_trx}" 
                       class="input-rupiah-clean" 
                       placeholder="0" 
                       value="${formatAngkaKeTitik(nominalDefaultOcr)}" 
                       oninput="prosesKetikanRupiah(this)">
              </div>
            </div>

            <div class="action-buttons">
              <button class="btn btn-acc" onclick="eksekusiLulusAdmin('${trx.id_trx}', '${trx.nama}')">✓ ACC</button>
              <button class="btn btn-tolak" onclick="eksekusiTolakAdmin('${trx.id_trx}', '${trx.nama}')">✕ TOLAK</button>
            </div>
          </div>
        `;
        kontainer.innerHTML += htmlCard;
      });
    }

    // MEMBUAT COMPONENT CARD LOG RIWAYAT
    function renderPanelRiwayat(listData) {
      let kontainer = document.getElementById("panel-riwayat");
      kontainer.innerHTML = "";

      if (listData.length === 0) {
        kontainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">Belum ada riwayat transaksi yang diproses hari ini.</div>`;
        return;
      }

      listData.reverse().forEach(trx => {
        let kelasStatus = trx.status.toUpperCase().includes("LUNAS") ? "status-lunas" : "status-ditolak";
        let htmlCard = `
          <div class="card" style="opacity: 0.85;">
            <div>
              <h3>${trx.nama}</h3>
              <div class="meta">
                <p>📅 ${trx.timestamp} | ID: ${trx.id_trx}</p>
                <span class="status-badge ${kelasStatus}">${trx.status}</span>
              </div>
              <p style="font-size: 14px; margin-bottom: 5px;">Nominal Pokok: <b>Rp ${parseInt(trx.nominal_pokok).toLocaleString('id-ID')}</b></p>
              <p style="font-size: 14px; color: var(--text-muted);">Nominal Total: Rp ${parseInt(trx.nominal_total).toLocaleString('id-ID')}</p>
            </div>
            <a href="${trx.link_struk}" target="_blank" class="btn-link" style="margin-top: 15px; margin-bottom: 0;">👁️ LIHAT FILE STRUK</a>
          </div>
        `;
        kontainer.innerHTML += htmlCard;
      });
    }

    // FUNGSI UTAMA 1: MASKING FORMAT TITIK SAAT ADMIN MENGETIK
    function prosesKetikanRupiah(inputan) {
      let nilaiBersih = inputan.value.replace(/[^0-9]/g, "");
      if (nilaiBersih !== "") {
        inputan.value = parseInt(nilaiBersih).toLocaleString('id-ID').replace(/,/g, ".");
      } else {
        inputan.value = "";
      }
    }

    // FUNGSI UTAMA 2: FORMAT ANGKA POLOS KE FORMAT TITIK
    function formatAngkaKeTitik(angka) {
      if (!angka) return "";
      return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // FUNGSI UTAMA 3: ACC DENGAN MODUL POP-UP PEMASTIAN
    function eksekusiLulusAdmin(idTrx, namaSantri) {
      let nilaiMasking = document.getElementById("input-mask-" + idTrx).value;
      let nominalBersih = nilaiMasking.replace(/[^0-9]/g, ""); // Bersihkan titik sebelum dikirim ke sheet
      let pinAdmin = document.getElementById("pin-admin").value;

      if (!nominalBersih || parseInt(nominalBersih) <= 0) {
        alert("⚠️ Kolom nominal wajib terisi angka yang valid!");
        return;
      }

      // MASUKAN UTAMA: Konfirmasi Konfirmatif Tegas
      let formatRupiahTampil = parseInt(nominalBersih).toLocaleString('id-ID').replace(/,/g, ".");
      let yakin = confirm(`Apakah benar Mas Admin Ganteng akan meluluskan Rp ${formatRupiahTampil} untuk santri:\n\n👤 Nama: ${namaSantri}\n\nJika data sudah valid, klik OK untuk membukukan kas ke Jurnal Bank.`);
      
      if (!yakin) return; // Stop jika Mas Admin ragu-ragu/salah pencet

      tampilkanLoading(true, "Menyimpan data & membukukan kas bank...");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          aksi: "luluskanTransaksiOlehAdmin",
          id_transaksi: idTrx,
          nominal_koreksi: nominalBersih,
          pin_admin: pinAdmin
        })
      })
      .then(res => res.json())
      .then(respon => {
        if (respon.status === "success") {
          alert(`✅ Sukses! Pembayaran ${namaSantri} sebesar Rp ${formatRupiahTampil} berhasil disetujui.`);
          muatDataLengkapSistem();
        } else {
          alert("❌ Gagal memproses: " + respon.message);
        }
      })
      .catch(err => alert("Kesalahan Jaringan: " + err.toString()))
      .finally(() => tampilkanLoading(false));
    }

    // FUNGSI UTAMA 4: TOLAK TRANSAKSI OLEH MANUAL ADMIN
    function eksekusiTolakAdmin(idTrx, namaSantri) {
      let pinAdmin = document.getElementById("pin-admin").value;
      let yakin = confirm(`Apakah Anda yakin ingin MENOLAK bukti transfer dari santri:\n\n👤 ${namaSantri}?\n\nStatus transaksi akan berubah menjadi DITOLAK.`);
      
      if (!yakin) return;

      tampilkanLoading(true, "Memproses pembatalan bukti transfer...");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          aksi: "tolakTransaksiOlehAdmin",
          id_transaksi: idTrx,
          pin_admin: pinAdmin
        })
      })
      .then(res => res.json())
      .then(respon => {
        if (respon.status === "success") {
          alert(`🔴 Bukti transfer untuk ${namaSantri} telah ditolak.`);
          muatDataLengkapSistem();
        } else {
          alert("❌ Gagal memproses: " + respon.message);
        }
      })
      .catch(err => alert("Kesalahan Jaringan: " + err.toString()))
      .finally(() => tampilkanLoading(false));
    }

    // Pengaturan Navigasi Tab Dashboard
    function gantiTab(tab) {
      currentTab = tab;
      document.getElementById("tab-pending").classList.remove("active");
      document.getElementById("tab-riwayat").classList.remove("active");
      document.getElementById("panel-pending").classList.add("hidden");
      document.getElementById("panel-riwayat").classList.add("hidden");

      if (tab === 'pending') {
        document.getElementById("tab-pending").classList.add("active");
        document.getElementById("panel-pending").classList.remove("hidden");
      } else {
        document.getElementById("tab-riwayat").classList.add("active");
        document.getElementById("panel-riwayat").classList.remove("hidden");
      }
    }

    function tampilkanLoading(kondisi, teks = "") {
      let screen = document.getElementById("loading-screen");
      if (kondisi) {
        if(teks) document.getElementById("loading-text").innerText = teks;
        screen.classList.remove("hidden");
      } else {
        screen.classList.add("hidden");
      }
    }
  </script>
</body>
</html>
