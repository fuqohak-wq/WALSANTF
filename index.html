<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Pembayaran Digital Otomatis PPMUY - YAYASAN YAHYAWIYYAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-900 via-teal-950 to-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-3 antialiased mx-auto w-full max-w-md md:max-w-xl lg:max-w-2xl">

    <header class="w-full space-y-1.5">
        <div class="bg-white/10 backdrop-blur-sm px-3 py-2 rounded-xl border border-white/10 flex justify-between items-center text-xs font-bold">
            <span id="txt-masehi" class="text-emerald-300">📅 Loading...</span>
            <span id="txt-hijriah" class="text-amber-300">⏳ Hijriah...</span>
        </div>
        <div class="text-center py-1">
            <h1 class="text-[10px] md:text-[11px] font-black text-amber-400 tracking-widest uppercase">YAYASAN YAHYAWIYYAH</h1>
            <h2 class="text-base md:text-lg font-extrabold text-white tracking-tight leading-tight">SISTEM PEMBAYARAN OTOMATIS PPMUY</h2>
        </div>
    </header>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz4WIiha9JSemWqoC4603207orwCm3eYd3XlMwXzNZBTLHvWsITLlyecHnjB4hvr-i03w/exec";
    </script>

    <main class="w-full flex-1 flex flex-col justify-center my-2 space-y-3">
        <div id="step-1" class="w-full bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-2">
            <label class="block text-xs font-black uppercase tracking-wider text-emerald-900">Cari Nama Santri / Ustadz :</label>
            <div class="relative">
                <input type="text" id="search-input" oninput="cariData()" placeholder="Ketik Nama Anak Anda di sini..." class="w-full bg-slate-100 border-2 border-emerald-200 focus:border-emerald-600 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 focus:outline-none transition">
                <span class="absolute right-4 top-3 text-lg">🔍</span>
            </div>
            <div id="search-results" class="space-y-1.5 max-h-44 overflow-y-auto hidden pt-1"></div>
        </div>

        <div id="step-2" class="w-full space-y-3 hidden">
            <div class="bg-gradient-to-r from-amber-500 to-amber-600 p-3.5 rounded-2xl text-slate-950 flex justify-between items-center shadow-md">
                <div>
                    <span class="text-[10px] uppercase font-black tracking-wider text-amber-950 block">Penerima Dana/Nafkah:</span>
                    <span id="target-nama" class="text-lg md:text-xl font-black tracking-tight block leading-tight"></span>
                    <span id="target-nik" class="text-xs font-bold text-amber-950 hidden"></span>
                </div>
                <span id="target-status" class="px-2.5 py-1 rounded-lg text-xs font-black uppercase tracking-wider bg-slate-950 text-amber-400"></span>
            </div>

            <div class="bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-1.5">
                <label class="block text-xs font-black uppercase tracking-wider text-emerald-900 text-center">Masukkan Jumlah Uang (Rp) :</label>
                <input type="number" id="nominal-pokok" oninput="hitungTotal()" placeholder="Contoh: 500000" class="w-full bg-slate-100 border-2 border-emerald-300 focus:border-emerald-600 rounded-xl px-3 py-2 text-2xl md:text-xl font-black text-center text-emerald-700 focus:outline-none transition shadow-inner">
            </div>

            <div id="box-instruksi" class="bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-3 hidden">
                <div class="text-center bg-emerald-50 p-3 rounded-xl border-2 border-emerald-200 shadow-inner">
                    <span class="text-xs text-emerald-950 font-black block uppercase tracking-wider">TOTAL YANG WAJIB DITRANSFER</span>
                    <div class="flex items-center justify-center gap-3 mt-1">
                        <span id="nominal-total-html" class="text-3xl md:text-xl font-black text-emerald-800 tracking-tight"></span>
                        <button onclick="salinTeks('nominal-total-raw', 'Nominal')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-black px-3 py-1.5 rounded-lg transition shadow">📋 SALIN</button>
                    </div>
                </div>
                
                <div class="text-sm bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <div class="flex justify-between items-center font-bold text-slate-700">
                        <span>🏦 Bank: <strong id="rek-bank" class="text-emerald-800 text-base font-black">BRI</strong></span>
                        <span id="rek-an" class="text-xs font-black text-slate-500 text-right uppercase">YAYASAN YAHYAWIYYAH</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-200 pt-2">
                        <span class="font-mono text-lg md:text-base font-black text-blue-900 bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-200" id="rek-nomor">003801003305309</span>
                        <button onclick="salinTeks('rek-nomor', 'Nomor Rekening')" class="bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-black px-3 py-1.5 rounded-lg transition shadow">📋 SALIN REK</button>
                    </div>
                </div>

                <div class="bg-amber-500/10 border-2 border-dashed border-amber-500 p-2.5 rounded-xl">
                    <label class="block text-xs font-black uppercase tracking-wider text-amber-900 mb-1.5 text-center">FOTO / UNGGAH STRUK TRANSFER</label>
                    <input type="file" id="file-struk" accept="image/*" class="w-full text-xs text-slate-700 bg-white p-1 rounded-xl border border-emerald-200 cursor-pointer shadow-sm">
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full space-y-2">
        <div id="area-tombol-submit" class="hidden">
            <button onclick="prosesValidasiOcr()" id="btn-submit" class="w-full bg-gradient-to-r from-amber-400 to-amber-500 text-slate-950 font-black py-4 md:py-2.5 rounded-2xl text-sm shadow-lg disabled:opacity-40 uppercase flex justify-center items-center gap-2 border-b-4 border-amber-700 active:border-b-0" disabled>
                <span id="btn-text" class="text-base md:text-sm font-black">Kirim & Proses Otomatis</span>
            </button>
        </div>
        <div class="text-[10px] text-emerald-400/60 text-center border-t border-white/5 pt-1.5 font-bold">
            &copy; 2026 Fuqohak Executive Tech. Strict Enterprise Engine V5.2.
        </div>
    </footer>

    <span id="nominal-total-raw" class="hidden">0</span>
    <canvas id="canvas-kompresor" class="hidden"></canvas>

    <script>
        let dbSantri = [];
        let santriTerpilih = null;
        let nominalTotalGlobal = 0;

        function muatSyiarIslam() {
            const skrg = new Date();
            const opsiMasehi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txt-masehi').innerText = "📅 " + skrg.toLocaleDateString('id-ID', opsiMasehi);
            document.getElementById('txt-hijriah').innerText = "Dzulhijjah 1447 H";
        }

        window.onload = async function() {
            muatSyiarIslam();
            try {
                const res = await fetch(API_URL);
                const hasil = await res.json();
                if(hasil.status === "success") {
                    dbSantri = hasil.santri;
                    if(hasil.rekening.bank) document.getElementById('rek-bank').innerText = hasil.rekening.bank;
                    if(hasil.rekening.nomor) document.getElementById('rek-nomor').innerText = hasil.rekening.nomor;
                    if(hasil.rekening.atas_nama) document.getElementById('rek-an').innerText = hasil.rekening.atas_nama;
                }
            } catch(e) { console.log("Gagal memuat database."); }
        };

        function cariData() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = "";
            if(query.length < 2) { resDiv.classList.add('hidden'); return; }

            const filtered = dbSantri.filter(s => s.nama.toLowerCase().includes(query) || s.nik.includes(query));
            if(filtered.length > 0) {
                resDiv.classList.remove('hidden');
                filtered.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-slate-50 p-3.5 rounded-xl text-xs flex justify-between items-center mt-1 text-slate-900 shadow-sm border border-slate-200";
                    btn.innerHTML = `<div><span class="block text-base font-black text-emerald-950">${s.nama}</span></div> <span class="bg-emerald-800 px-2 py-0.5 rounded text-[10px] text-white font-black uppercase">${s.status}</span>`;
                    btn.onclick = () => pilihSantri(s);
                    resDiv.appendChild(btn);
                });
            }
        }

        function pilihSantri(santri) {
            santriTerpilih = santri;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-input').value = santri.nama;
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('area-tombol-submit').classList.remove('hidden');
            document.getElementById('target-nama').innerText = santri.nama;
            document.getElementById('target-nik').innerText = "NIK: " + santri.nik;
            document.getElementById('target-status').innerText = santri.status;
            document.getElementById('nominal-pokok').value = "";
            document.getElementById('box-instruksi').classList.add('hidden');
            document.getElementById('btn-submit').disabled = true;
        }

        function hitungTotal() {
            const nPokok = parseInt(document.getElementById('nominal-pokok').value) || 0;
            const boxInstruksi = document.getElementById('box-instruksi');
            const btnSubmit = document.getElementById('btn-submit');

            if(nPokok >= 10000 && santriTerpilih) {
                boxInstruksi.classList.remove('hidden');
                const kodeInt = parseInt(santriTerpilih.kode) || 0;
                nominalTotalGlobal = nPokok + kodeInt;
                document.getElementById('nominal-total-html').innerText = "Rp " + nominalTotalGlobal.toLocaleString('id-ID');
                document.getElementById('nominal-total-raw').innerText = nominalTotalGlobal;
                btnSubmit.disabled = false;
            } else {
                boxInstruksi.classList.add('hidden');
                btnSubmit.disabled = true;
            }
        }

        function salinTeks(elementId, jenisInfo) {
            let teksYgDisalin = document.getElementById(elementId).innerText;
            if(elementId === 'rek-nomor') { teksYgDisalin = teksYgDisalin.replace(/\s/g, ''); }
            navigator.clipboard.writeText(teksYgDisalin).then(() => { alert(`Alhamdulillah, ${jenisInfo} berhasil disalin!`); });
        }

        // KANVAS OPTIMASI TINGKAH TINGGI V5.2 (Grayscale Adaptif Pro)
        const optimasiGambarSisiKlien = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.getElementById('canvas-kompresor');
                    const ctx = canvas.getContext('2d');
                    
                    const TARGET_WIDTH = 1300; // Menaikkan resolusi sedikit untuk ketajaman teks kecil
                    let width = img.width;
                    let height = img.height;
                    height *= TARGET_WIDTH / width;
                    width = TARGET_WIDTH;

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const imgData = ctx.getImageData(0, 0, width, height);
                    const data = imgData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        let r = data[i], g = data[i+1], b = data[i+2];
                        let grayscale = 0.299 * r + 0.587 * g + 0.114 * b;
                        // Penajaman kontras huruf tipis bank
                        let v = grayscale < 160 ? grayscale * 0.35 : Math.min(255, grayscale * 1.35);
                        data[i] = data[i+1] = data[i+2] = v;
                    }
                    
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.95));
                };
            };
        });

        async function prosesValidasiOcr() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const fileInput = document.getElementById('file-struk');

            if (fileInput.files.length === 0) {
                alert("Silakan pilih/foto struk transfer terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "ENGINE MULTI-SCANNING AKTIF...";

            try {
                const fileGambarMentah = fileInput.files[0];
                const base64HasilFilter = await optimasiGambarSisiKlien(fileGambarMentah);

                const worker = await Tesseract.createWorker('ind', 1);
                
                // SCAN LAPIS 1: Membaca teks bebas huruf kapital untuk validasi nama dan entitas text
                const retTeks = await worker.recognize(base64HasilFilter);
                const rawTextUpper = retTeks.data.text.toUpperCase().replace(/[\.\-]/g, '');

                // 🛑 VALIDASI A: Nama & Rekening Yayasan Tujuan (WAJIB ADA)
                const keywordYayasan = ["YAYASAN", "YAHYAWIYYAH", "YAHYA", "WIYYAH", "PPMUY"];
                const targetRekeningYayasan = "003801003305309";
                
                const adaNamaYayasan = keywordYayasan.some(key => rawTextUpper.includes(key));
                const adaRekeningYayasan = rawTextUpper.includes(targetRekeningYayasan);

                if (!adaNamaYayasan || !adaRekeningYayasan) {
                    alert("VALIDASI GAGAL! Struk tidak ditujukan ke Rekening BRI YAYASAN YAHYAWIYYAH (003801003305309). Sistem otomatis memblokir struk bank/toko lain.");
                    await worker.terminate();
                    btn.disabled = false; btnText.innerText = "Kirim & Proses Otomatis";
                    return;
                }

                // 🛑 VALIDASI B: Deteksi Keberadaan Identitas Pengirim (Nama & No Rekening Pengirim)
                const keywordPengirim = ["DARI", "PENGIRIM", "REKENING ASAL", "SUMBER", "SENDER", "NAMA", "DEBET"];
                const adaIndikasiPengirim = keywordPengirim.some(key => rawTextUpper.includes(key));
                
                // Mencari apakah ada angka mandiri min 6-10 digit berjejer sebagai asumsi nomor rekening asal pengirim
                const matchRekPengirim = rawTextUpper.replace(/[^0-9]/g, '').match(/[0-9]{6,20}/);

                if (!adaIndikasiPengirim || !matchRekPengirim) {
                    alert("VALIDASI GAGAL! Informasi Nama Pengirim atau Nomor Rekening Asal tidak terdeteksi pada struk. Pastikan struk tercetak jelas.");
                    await worker.terminate();
                    btn.disabled = false; btnText.innerText = "Kirim & Proses Otomatis";
                    return;
                }

                // SCAN LAPIS 2: Mengunci Whitelist angka murni untuk akurasi nominal & Ref ID
                await worker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789' });
                const retAngka = await worker.recognize(base64HasilFilter);
                const rawTextAlfanumerik = retAngka.data.text.toUpperCase();
                await worker.terminate();

                // 🛑 VALIDASI C: Pencocokan Nomor Referensi (Ref ID)
                const textCleanAlfanumerik = rawTextAlfanumerik.replace(/[^A-Z0-9]/g, '');
                const matchRefSpesifik = textCleanAlfanumerik.match(/[A-Z0-9]{12,30}/);
                let noRefTerdeteksi = matchRefSpesifik ? matchRefSpesifik[0] : "REFAUTO-" + Math.floor(Date.now() / 1000);

                // 🛑 VALIDASI D: Pencocokan Nominal Eksak (Token Match)
                const listKataStruk = rawTextAlfanumerik.split(/[\s\n\r]+/);
                const targetNominal = nominalTotalGlobal.toString();
                const targetNominalEkorNol = targetNominal + "00";
                let adaNominalMurniSah = false;

                for (let kata of listKataStruk) {
                    let angkaSaja = kata.replace(/[^0-9]/g, '');
                    if (angkaSaja === targetNominal || angkaSaja === targetNominalEkorNol) {
                        adaNominalMurniSah = true;
                        break;
                    }
                }

                if (!adaNominalMurniSah) {
                    alert(`VALIDASI GAGAL! Angka nominal tagihan "${targetNominal}" tidak ditemukan secara tepat/utuh di baris manapun dalam struk.`);
                    btn.disabled = false; btnText.innerText = "Kirim & Proses Otomatis";
                    return;
                }

                // JIKA SEMUA VALIDASI AMAN, KIRIM KE GOOGLE SHEET
                btnText.innerText = "MENYIMPAN DATA AMAN...";

                const payload = {
                    aksi: "simpanTransaksiDenganFileB64",
                    nik: santriTerpilih.nik,
                    nama: santriTerpilih.nama,
                    nominal_pokok: parseInt(document.getElementById('nominal-pokok').value) || 0,
                    nominal_total: nominalTotalGlobal,
                    image_base64: base64HasilFilter, 
                    file_name: `STRUK_${santriTerpilih.nik}_${Date.now()}.jpg`,
                    device: navigator.userAgent,
                    no_ref: noRefTerdeteksi
                };

                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const hasil = await response.json();

                if (hasil.status === "success") {
                    alert("Alhamdulillah, Seluruh Struktur Struk Terverifikasi Sah & Otomatis Disimpan!");
                    location.reload();
                } else {
                    alert(hasil.message);
                }

                btn.disabled = false; btnText.innerText = "Kirim & Proses Otomatis";

            } catch (e) {
                console.error(e);
                alert("Terjadi kesalahan sistem pembacaan gambar.");
                btn.disabled = false; btnText.innerText = "Kirim & Proses Otomatis";
            }
        }
    </script>
</body>
</html>
