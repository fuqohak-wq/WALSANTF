<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Pembayaran Digital Otomatis PPMUY - YAYASAN YAHYAWIYYAH</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-900 via-teal-950 to-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 antialiased mx-auto w-full max-w-md">

    <header class="w-full text-center py-2 space-y-1">
        <h1 class="text-[10px] font-black text-amber-400 tracking-widest uppercase">YAYASAN YAHYAWIYYAH</h1>
        <h2 class="text-base font-extrabold text-white tracking-tight leading-tight">SISTEM KONFIRMASI STRUK OTOMATIS</h2>
    </header>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz4WIiha9JSemWqoC4603207orwCm3eYd3XlMwXzNZBTLHvWsITLlyecHnjB4hvr-i03w/exec";
    </script>

    <main class="w-full flex-1 flex flex-col justify-center my-4 space-y-4">
        <div class="w-full bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-2">
            <label class="block text-xs font-black uppercase tracking-wider text-emerald-900">1. Cari Nama Santri / Ustadz :</label>
            <div class="relative">
                <input type="text" id="search-input" oninput="cariData()" placeholder="Ketik nama anak di sini..." class="w-full bg-slate-100 border-2 border-emerald-200 focus:border-emerald-600 rounded-xl px-4 py-3 text-sm font-bold text-slate-900 focus:outline-none transition">
            </div>
            <div id="search-results" class="space-y-1.5 max-h-44 overflow-y-auto hidden pt-1"></div>
        </div>

        <div id="step-upload" class="w-full bg-white text-slate-900 p-4 rounded-2xl shadow-xl space-y-3 hidden">
            <div class="bg-emerald-800 text-white p-3 rounded-xl shadow">
                <span class="text-[10px] uppercase font-bold text-emerald-300 block">Anak yang Dipilih:</span>
                <span id="target-nama" class="text-base font-black block leading-tight"></span>
                <span id="target-kode" class="inline-block bg-amber-400 text-slate-950 font-black text-[10px] px-2 py-0.5 rounded mt-1">SISTEM BERHASIL MENGUNCI IDENTITAS ANAK</span>
            </div>

            <div class="space-y-1.5 pt-1">
                <span class="block text-xs font-black uppercase tracking-wider text-slate-700">2. Upload / Foto Struk Transfer :</span>
                <label for="file-struk" class="flex flex-col items-center justify-center border-2 border-dashed border-emerald-600 bg-emerald-50/50 hover:bg-emerald-50 rounded-2xl p-5 cursor-pointer transition text-center group">
                    <span id="icon-upload" class="text-3xl mb-1">📸</span>
                    <span id="text-upload-label" class="text-sm font-black text-emerald-950">Klik untuk Pilih Struk</span>
                    <span id="text-upload-sub" class="text-[10px] text-slate-500 font-medium mt-0.5">Transfer nominal berapapun akan diterima & diproses otomatis.</span>
                </label>
                <input type="file" id="file-struk" accept="image/*" onchange="fileKenaInput(this)" class="hidden">
            </div>
        </div>
    </main>

    <footer>
        <div id="area-tombol-submit" class="hidden">
            <button onclick="prosesOtomatisasiOcrTotal()" id="btn-submit" class="w-full bg-gradient-to-r from-amber-400 to-amber-500 text-slate-950 font-black py-4 rounded-2xl text-sm shadow-lg uppercase flex flex-col justify-center items-center transition duration-200 border-b-4 border-amber-700 active:border-b-0" disabled>
                <span id="btn-text" class="text-sm font-black tracking-wide">Kirim Bukti Transfer</span>
                <div id="progress-bar-container" class="w-2/3 bg-slate-950/20 h-1.5 rounded-full mt-1.5 hidden overflow-hidden">
                    <div id="progress-bar-fill" class="bg-slate-950 h-full w-0 transition-all duration-150"></div>
                </div>
            </button>
        </div>
        <div class="text-[10px] text-emerald-400/60 text-center pt-3 font-bold">
            &copy; 2026 PPMUY Auto-Pilot System V8.5 Flexible-OCR.
        </div>
    </footer>

    <canvas id="canvas-kompresor" class="hidden"></canvas>

    <script>
        let dbSantri = [];
        let santriTerpilih = null;

        window.onload = async function() {
            try {
                const res = await fetch(API_URL);
                const hasil = await res.json();
                if(hasil.status === "success") { dbSantri = hasil.santri; }
            } catch(e) { console.log("Gagal memuat database."); }
        };

        function cariData() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = "";
            if(query.length < 2) { resDiv.classList.add('hidden'); return; }

            const filtered = dbSantri.filter(s => s.nama.toLowerCase().includes(query) || s.nik.includes(query));
            if(filtered.length > 0) {
                resDiv.classList.remove('hidden');
                filtered.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-slate-50 p-3 rounded-xl flex justify-between items-center mt-1 border border-slate-200 shadow-sm";
                    btn.innerHTML = `<div><span class="block text-sm font-black text-slate-900">${s.nama}</span></div> <span class="bg-emerald-800 text-white font-black text-[10px] px-2 py-0.5 rounded">ID: +${s.kode}</span>`;
                    btn.onclick = () => pilihSantri(s);
                    resDiv.appendChild(btn);
                });
            }
        }

        function pilihSantri(santri) {
            santriTerpilih = santri;
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-input').value = santri.nama;
            document.getElementById('step-upload').classList.remove('hidden');
            document.getElementById('area-tombol-submit').classList.remove('hidden');
            document.getElementById('target-nama').innerText = santri.nama;
            document.getElementById('target-kode').innerText = "KODE UNIK SISTEM: -" + santri.kode;
            document.getElementById('btn-submit').disabled = true;
        }

        function fileKenaInput(input) {
            if(input.files.length > 0) {
                document.getElementById('icon-upload').innerText = "📄";
                document.getElementById('text-upload-label').innerText = "Struk Berhasil Dimasukkan!";
                document.getElementById('btn-submit').disabled = false;
            }
        }

        const optimasiGambarSisiKlien = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.getElementById('canvas-kompresor');
                    const ctx = canvas.getContext('2d');
                    const TARGET_WIDTH = 1200; 
                    let width = img.width;
                    let height = img.height;
                    if (width > height) { let temp = width; width = height; height = temp; }
                    height *= TARGET_WIDTH / width; width = TARGET_WIDTH;
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const imgData = ctx.getImageData(0, 0, width, height);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        let grayscale = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        data[i] = data[i+1] = data[i+2] = grayscale;
                    }
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
        });

        async function prosesOtomatisasiOcrTotal() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const fileInput = document.getElementById('file-struk');
            const barContainer = document.getElementById('progress-bar-container');
            const barFill = document.getElementById('progress-bar-fill');

            btn.disabled = true;
            barContainer.classList.remove('hidden');
            barFill.style.width = "10%";
            btnText.innerText = "MENGANALISIS STRUK (10%)...";

            try {
                const fileGambarMentah = fileInput.files[0];
                const base64HasilFilter = await optimasiGambarSisiKlien(fileGambarMentah);

                const worker = await Tesseract.createWorker('ind', 1, {
                    logger: progress => {
                        if (progress.status === 'recognizing text') {
                            const persenAngka = Math.floor(progress.progress * 100);
                            barFill.style.width = `${persenAngka}%`;
                            btnText.innerText = `MEMPROSES DATA... (${persenAngka}%)`;
                        }
                    }
                });

                await worker.setParameters({ tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-:/.,' });
                const ret = await worker.recognize(base64HasilFilter);
                const rawTextClean = ret.data.text.toUpperCase().replace(/[^A-Z0-9]/g, '');
                const textMurniTanpaSpasi = ret.data.text.replace(/\s+/g, '');
                await worker.terminate();

                // 1. VALIDASI ATRIBUT TUJUAN YAYASAN
                const kataKunciValid = ["YAYASAN", "YAHYA", "WIYYAH", "PPMUY", "5309", "0038"];
                const apakahStrukYayasan = kataKunciValid.some(key => rawTextClean.includes(key));
                if (!apakahStrukYayasan) {
                    alert("❌ STRUK TOLAK: Nama 'YAYASAN YAHYAWIYYAH' atau nomor rekening '5309' tidak terdeteksi. Pastikan mengunggah struk transfer yang benar.");
                    btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
                    return;
                }

                // 2. RADAR CERDAS MENCARI NOMINAL UTAMA TRANSFER (BERAPAPUN ANGKA BULATNYA)
                const daftarAngkaStruk = textMurniTanpaSpasi.replace(/,00$/g, '').match(/\d[\d\.,]*/g) || [];
                let nominalTotalDitemukan = 0;

                // Urutkan kandidat angka terbesar agar nominal pokok transfer langsung tertangkap duluan
                let daftarKandidatAngka = [];
                for (let hitung of daftarAngkaStruk) {
                    let angkaClean = hitung.replace(/[^0-9]/g, '');
                    let nominalKandidat = parseInt(angkaClean);
                    if (nominalKandidat >= 10000 && nominalKandidat <= 50000000) {
                        daftarKandidatAngka.push(nominalKandidat);
                    }
                }
                
                if (daftarKandidatAngka.length > 0) {
                    // Ambil angka terbesar yang bukan nomor rekening tujuan (003801003305309)
                    let filteredKandidat = daftarKandidatAngka.filter(num => !String(num).includes("5309") && !String(num).includes("0038"));
                    if (filteredKandidat.length > 0) {
                        nominalTotalDitemukan = Math.max(...filteredKandidat);
                    }
                }

                if (nominalTotalDitemukan === 0) {
                    alert(`❌ VALIDASI NOMINAL GAGAL: Jumlah uang transfer di dalam struk tidak terbaca jelas. Mohon upload ulang screenshot dengan kualitas yang lebih tajam.`);
                    btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
                    return;
                }

                // 3. RADAR NOMOR REFERENSI BANK
                let noRefFinal = "";
                const radarBCA = textMurniTanpaSpasi.match(/Ref(?:id)?[:\s\.]*([0-9A-Z]{12,30})/i) || textMurniTanpaSpasi.match(/950[0-9A-Z]{15,25}/i);
                const radarDANA = textMurniTanpaSpasi.match(/IDDANA[0-9]{15,25}/i);
                const radarShopee = textMurniTanpaSpasi.match(/No\.Transaksi[0-9A-Za-z]{18,30}/i) || textMurniTanpaSpasi.match(/2026[0-9]{14,22}/);
                const radarBRI = textMurniTanpaSpasi.match(/(?:BRIMORef|No\.Ref|Ref\.:)([0-9]{12,20})/i);
                const radarUmumAngkaPanjang = textMurniTanpaSpasi.match(/[0-9]{14,28}/);

                if (radarBCA) noRefFinal = "BCA-" + (radarBCA[1] || radarBCA[0]).toUpperCase();
                else if (radarDANA) noRefFinal = radarDANA[0].toUpperCase();
                else if (radarShopee) noRefFinal = "SPAY-" + radarShopee[0].toUpperCase();
                else if (radarBRI) noRefFinal = "BRI-" + (radarBRI[1] || radarBRI[0]).toUpperCase();
                else if (radarUmumAngkaPanjang && !radarUmumAngkaPanjang[0].includes("003801003305309")) noRefFinal = "REF-" + radarUmumAngkaPanjang[0];

                if (!noRefFinal || noRefFinal.length < 9) {
                    alert("❌ ANTI-FRAUD LOG: Nomor Referensi transaksi bank gagal divalidasi. Gunakan screenshot aplikasi bank asli yang tidak terpotong.");
                    btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
                    return;
                }

                btnText.innerText = "MENYIMPAN DATA AMAN...";

                const payload = {
                    aksi: "simpanTransaksiOtomatisPenuh",
                    nik: santriTerpilih.nik,
                    nama: santriTerpilih.nama,
                    nominal_total: nominalTotalDitemukan,
                    image_base64: base64HasilFilter, 
                    file_name: `STRUK_${santriTerpilih.nik}_${Date.now()}.jpg`,
                    device: navigator.userAgent,
                    no_ref: noRefFinal
                };

                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const hasil = await response.json();

                if (hasil.status === "success") {
                    alert(`Alhamdulillah Berhasil!\nSistem membaca nominal struk sebesar Rp ${nominalTotalDitemukan.toLocaleString('id-ID')}.\nData tabungan santri telah diperbarui.`);
                    location.reload();
                } else {
                    alert(hasil.message);
                }

                btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";

            } catch (e) {
                console.error(e);
                alert("Gagal memproses gambar. Pastikan gambar jernih.");
                btn.disabled = false; barContainer.classList.add('hidden'); btnText.innerText = "Kirim Bukti Transfer";
            }
        }
    </script>
</body>
</html>
